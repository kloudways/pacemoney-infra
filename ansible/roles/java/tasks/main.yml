---
- name: Install OpenJDK 21
  ansible.builtin.apt:
    name: openjdk-21-jdk-headless
    state: present

- name: Set JAVA_HOME system-wide
  ansible.builtin.lineinfile:
    path: /etc/environment
    regexp: '^JAVA_HOME='
    line: 'JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64'
    create: true
    mode: '0644'
